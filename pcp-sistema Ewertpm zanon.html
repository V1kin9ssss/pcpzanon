<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema PCP/ERP — Planejamento e Controle da Produção</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
/* ════════════════════════════════════════
   VARIABLES & RESET
════════════════════════════════════════ */
:root {
  --bg:       #f0f2f8;
  --white:    #ffffff;
  --navy:      #1b2a4a;
  --navy2:    #243460;
  --blue:      #3b6cf7;
  --blue2:    #2d5be8;
  --blue-lt:  #e8effe;
  --blue-md:  #c2d3fd;
  --teal:      #06b6d4;
  --teal-lt:  #cffafe;
  --green:    #16a34a;
  --green-lt: #dcfce7;
  --amber:    #d97706;
  --amber-lt: #fef3c7;
  --red:       #dc2626;
  --red-lt:    #fee2e2;
  --purple:    #7c3aed;
  --purple-lt:#ede9fe;
  --tx1:       #1b2a4a;
  --tx2:       #4a5878;
  --tx3:       #8898b8;
  --bdr:       #dde3f0;
  --bdr2:      #c8d0e8;
  --sh1:       0 2px 8px rgba(27,42,74,.08);
  --sh2:       0 6px 24px rgba(27,42,74,.13);
  --sh3:       0 16px 56px rgba(27,42,74,.20);
  --r:         14px;
  --r2:        10px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--tx1);font-family:'Plus Jakarta Sans',sans-serif;min-height:100vh}

/* ════════════════════════════════════════
   LAYOUT
════════════════════════════════════════ */
.shell{display:flex;min-height:100vh}

.sb{
  width:248px;flex-shrink:0;background:var(--navy);
  position:fixed;top:0;left:0;bottom:0;z-index:60;
  display:flex;flex-direction:column;overflow:hidden;
}
.sb-logo{padding:22px 20px 18px;border-bottom:1px solid rgba(255,255,255,.08)}
.sb-brand{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.sb-icon{width:36px;height:36px;border-radius:10px;background:var(--blue);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.sb-name{font-size:15px;font-weight:800;color:#fff;letter-spacing:.3px}
.sb-sub{font-size:10px;color:rgba(255,255,255,.38);letter-spacing:1.2px;text-transform:uppercase}
.sb-nav{flex:1;padding:14px 10px;display:flex;flex-direction:column;gap:2px;overflow-y:auto}
.sb-sec{font-size:9px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.28);padding:12px 10px 6px;margin-top:4px}
.nb{
  display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;
  color:rgba(255,255,255,.52);font-size:13px;font-weight:600;
  cursor:pointer;transition:all .18s;border:none;background:transparent;width:100%;text-align:left
}
.nb:hover{background:rgba(255,255,255,.08);color:rgba(255,255,255,.88)}
.nb.on{background:var(--blue);color:#fff;box-shadow:0 4px 16px rgba(59,108,247,.38)}
.nb .ni{font-size:16px;width:22px;text-align:center;flex-shrink:0}
.nb .nk{margin-left:auto;background:rgba(255,255,255,.16);color:rgba(255,255,255,.8);font-size:9px;font-weight:700;font-family:'JetBrains Mono',monospace;padding:2px 7px;border-radius:20px;min-width:22px;text-align:center}
.sb-ft{padding:14px 10px;border-top:1px solid rgba(255,255,255,.08)}
.bt-danger{
  display:flex;align-items:center;gap:8px;width:100%;
  padding:10px 14px;border-radius:10px;border:1px solid rgba(220,38,38,.3);
  background:rgba(220,38,38,.1);color:#f87171;font-size:12px;font-weight:700;
  cursor:pointer;transition:all .18s
}

.cx{margin-left:248px;flex:1;display:flex;flex-direction:column;min-height:100vh}

.tb{
  background:var(--white);border-bottom:1px solid var(--bdr);
  padding:14px 32px;display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:40;box-shadow:var(--sh1)
}
.tb-title{font-size:17px;font-weight:800;color:var(--navy)}
.tb-sub{font-size:11px;color:var(--tx3);margin-top:2px}

.bt-prof{
  display:flex;align-items:center;gap:7px;padding:7px 14px;
  border-radius:10px;border:1.5px solid var(--bdr2);background:var(--white);
  color:var(--tx2);font-size:12px;font-weight:700;cursor:pointer;transition:all .18s
}
.bt-prof.on{background:var(--amber-lt);border-color:#fcd34d;color:#92400e}

.pg{display:none;padding:28px 32px;animation:pgIn .2s ease}
.pg.on{display:block}
@keyframes pgIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* Cards & Components Simple Reset */
.card{background:var(--white);border-radius:var(--r);border:1px solid var(--bdr);padding:22px;box-shadow:var(--sh1);margin-bottom:20px}
.kp{background:var(--white);border-radius:var(--r);border:1px solid var(--bdr);padding:18px 20px;box-shadow:var(--sh1)}
.kp-lb{font-size:10px;font-weight:800;color:var(--tx3);text-transform:uppercase;margin-bottom:6px}
.kp-vl{font-size:30px;font-weight:800;color:var(--navy)}
.kp-vl.bl{color:var(--blue)}
</style>
</head>
<body>
<div class="shell">

<aside class="sb">
  <div class="sb-logo">
    <div class="sb-brand">
      <div class="sb-icon">⚙</div>
      <div>
        <div class="sb-name">PCP / ERP</div>
        <div class="sb-sub">Sest Senat</div>
      </div>
    </div>
  </div>
  <nav class="sb-nav">
    <div class="sb-sec">Cadastros</div>
    <button class="nb on" onclick="goPg('produto', this)"><span class="ni">📦</span>Produto Pai</button>
    <button class="nb" onclick="goPg('pmp', this)"><span class="ni">🗓</span>PMP</button>
  </nav>
  <div class="sb-ft">
    <button class="bt-danger" onclick="alert('Limpo!')">🗑 Limpar Dados</button>
  </div>
</aside>

<div class="cx">
  <div class="tb">
    <div>
      <div class="tb-title" id="tb-title">Produto Pai</div>
      <div class="tb-sub">Painel de Controle de Produção</div>
    </div>
    <div class="tb-right">
      <button class="bt-prof" id="prof-bt" onclick="this.classList.toggle('on')">🎓 Modo Professor</button>
    </div>
  </div>

  <div class="pg on" id="pg-produto">
    <div class="card">
       <h2>📦 Gestão de Produtos</h2>
       <p>Adicione ou gerencie seus itens de produção.</p>
    </div>
    <div class="kp">
      <div class="kp-lb">Total Produção</div>
      <div class="kp-vl bl" id="pmp-kp">0</div>
      <div class="kp-ds">unidades</div>
    </div>
  </div>

  <div class="pg" id="pg-pmp">
    <div class="card">
       <h2>🗓 Plano Mestre</h2>
       <p>Configure o cronograma semanal.</p>
    </div>
  </div>

</div>
</div>

<script>
function goPg(pgId, btn) {
  // Esconde todas as páginas
  document.querySelectorAll('.pg').forEach(p => p.classList.remove('on'));
  // Mostra a selecionada
  document.getElementById('pg-' + pgId).classList.add('on');
  
  // Atualiza botões do menu
  document.querySelectorAll('.nb').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  
  // Atualiza título da Topbar
  const titles = {
    'produto': 'Produto Pai',
    'pmp': 'PMP - Plano Mestre'
  };
  document.getElementById('tb-title').innerText = titles[pgId] || 'PCP';
}
</script>

</body>
</html>
